<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Toolkit — 50 Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:#1e293b;padding:24px 32px;border-bottom:1px solid #334155}
header h1{font-size:24px;color:#38bdf8}
header p{color:#94a3b8;margin-top:4px;font-size:14px}
.search-bar{padding:16px 32px;background:#1e293b;border-bottom:1px solid #334155}
.search-bar input{width:100%;max-width:500px;padding:10px 16px;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.search-bar input:focus{border-color:#38bdf8}
.categories{display:flex;gap:8px;padding:16px 32px;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
.cat-btn{padding:6px 14px;border-radius:20px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;font-size:13px;transition:all .2s}
.cat-btn:hover,.cat-btn.active{background:#0284c7;border-color:#0284c7;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:24px 32px}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:18px;cursor:pointer;transition:all .2s;text-decoration:none;display:block}
.card:hover{border-color:#38bdf8;transform:translateY(-2px);box-shadow:0 4px 20px rgba(56,189,248,.15)}
.card-icon{font-size:24px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:6px}
.card-desc{font-size:12px;color:#64748b;line-height:1.5}
.card-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;margin-top:8px;font-weight:500}
.badge-technical{background:#1e3a5f;color:#60a5fa}
.badge-content{background:#1a3a2e;color:#4ade80}
.badge-keyword{background:#3a1f5f;color:#c084fc}
.badge-backlink{background:#3a1a1a;color:#f87171}
.badge-local{background:#3a2a10;color:#fb923c}
footer{text-align:center;padding:24px;color:#475569;font-size:13px;border-top:1px solid #334155}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:18px;color:#f1f5f9}
.modal-close{background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;line-height:1}
.modal-body{padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:#38bdf8}
.form-group textarea{min-height:80px;resize:vertical}
.btn-run{width:100%;padding:12px;background:#0284c7;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-run:hover{background:#0369a1}
.btn-run:disabled{background:#334155;cursor:not-allowed}
.result-box{margin-top:20px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:16px;max-height:400px;overflow-y:auto}
.result-box pre{font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:#94a3b8}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 16px;flex:1;min-width:100px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:#38bdf8}
.stat-label{font-size:11px;color:#64748b;margin-top:2px}
.issue-item{padding:6px 10px;background:#3b1515;border-left:3px solid #ef4444;border-radius:4px;margin:4px 0;font-size:13px;color:#fca5a5}
.pass-item{padding:6px 10px;background:#0f3a1f;border-left:3px solid #22c55e;border-radius:4px;margin:4px 0;font-size:13px;color:#86efac}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;margin:2px}
.tag-desc{background:#1e3a5f;color:#60a5fa}
.tag-generic{background:#3a2a10;color:#fb923c}
.tag-empty{background:#3b1515;color:#f87171}
.tag-image{background:#1a2a3a;color:#67e8f9}
.tag-naked_url{background:#2a1a3a;color:#c084fc}
.loading{text-align:center;padding:20px;color:#64748b}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.score-bar{height:8px;background:#334155;border-radius:4px;overflow:hidden;margin-top:4px}
.score-fill{height:100%;border-radius:4px;transition:width .5s}
.hidden{display:none}
</style>
</head>
<body>

<header>
  <h1>🔧 SEO Toolkit</h1>
  <p>50 powerful SEO analysis tools — powered by your Render API</p>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search tools... (e.g. 'meta', 'speed', 'keyword')" oninput="filterTools()">
</div>

<div class="categories">
  <button class="cat-btn active" onclick="filterCat('all',this)">All (50)</button>
  <button class="cat-btn" onclick="filterCat('technical',this)">⚙️ Technical SEO</button>
  <button class="cat-btn" onclick="filterCat('content',this)">📝 Content</button>
  <button class="cat-btn" onclick="filterCat('keyword',this)">🔍 Keywords</button>
  <button class="cat-btn" onclick="filterCat('backlink',this)">🔗 Backlinks</button>
  <button class="cat-btn" onclick="filterCat('local',this)">📍 Local SEO</button>
</div>

<div class="grid" id="toolGrid"></div>

<footer>SEO Toolkit &bull; 50 Tools &bull; Built on Render.com + cPanel</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Tool</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const API = "https://pi-app-6gkl.onrender.com";

const TOOLS = [
  {id:"analyze",icon:"⚓",title:"Anchor Text Analyzer",desc:"Analyzes anchor text distribution, types, and keyword usage in links",cat:"content",badge:"content",
   fields:[{label:"URL to analyze",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.total||0}</div><div class="stat-label">Total Links</div></div><div class="stat"><div class="stat-val">${d.internal||0}</div><div class="stat-label">Internal</div></div><div class="stat"><div class="stat-val">${d.external||0}</div><div class="stat-label">External</div></div></div>${renderDist(d.type_distribution)}<br><b>Top Anchors:</b><br>${(d.top_anchors||[]).map(([a,c])=>`<div style="padding:4px 0;border-bottom:1px solid #334155;font-size:13px">${c}× <span style="color:#94a3b8">"${a||'(empty)'}"</span></div>`).join("")}`},

  {id:"meta-tags",icon:"🏷️",title:"Meta Tag Analyzer",desc:"Analyzes title, meta description, OG tags, Twitter cards, schema, and more",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.title_length||0}</div><div class="stat-label">Title Length</div></div><div class="stat"><div class="stat-val">${d.meta_desc_length||0}</div><div class="stat-label">Desc Length</div></div><div class="stat"><div class="stat-val">${d.schema_count||0}</div><div class="stat-label">Schemas</div></div></div><b>Title:</b> ${d.title||"—"}<br><br><b>Issues:</b><br>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">No issues found ✅</div>'}`},

  {id:"headings",icon:"📋",title:"Heading Analyzer",desc:"Validates H1-H6 heading hierarchy, checks keyword usage, flags skip levels",cat:"content",badge:"content",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"},{label:"Target Keyword (optional)",key:"keyword",type:"text",ph:"seo tools"}],
   render:(d)=>`<b>Heading Structure:</b><br>${(d.headings||[]).map(h=>`<div style="padding:3px 0 3px ${(h.level-1)*16}px;font-size:13px"><span style="color:#38bdf8">${h.tag}</span> ${h.text}</div>`).join("")}<br><b>Issues:</b><br>${(d.issues||[]).map(i=>`<div class="${i.severity==='ERROR'?'issue-item':'pass-item'}">[${i.severity}] ${i.message}</div>`).join("")||'<div class="pass-item">No issues ✅</div>'}`},

  {id:"broken-links",icon:"💔",title:"Broken Link Checker",desc:"Checks all links on a page for 404s, timeouts, and connection errors",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.total_links||0}</div><div class="stat-label">Links Checked</div></div><div class="stat"><div class="stat-val" style="color:${d.broken_count>0?'#ef4444':'#22c55e'}">${d.broken_count||0}</div><div class="stat-label">Broken</div></div></div>${(d.broken||[]).length?`<b>Broken Links:</b><br>${d.broken.map(b=>`<div class="issue-item">[${b.status||b.error}] ${b.url}</div>`).join("")}`:'<div class="pass-item">No broken links found ✅</div>'}`},

  {id:"canonical",icon:"🔗",title:"Canonical Checker",desc:"Validates canonical URL tags, detects missing, cross-domain, and mismatched canonicals",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<b>Canonical:</b> ${d.canonical||"<em>None found</em>"}<br><br><b>Self-referencing:</b> ${d.is_self_referencing?"✅ Yes":"❌ No"}<br><br>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">Canonical looks good ✅</div>'}`},

  {id:"image-seo",icon:"🖼️",title:"Image SEO Analyzer",desc:"Audits images for alt text, dimensions, format, lazy loading, and filenames",cat:"content",badge:"content",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.total||0}</div><div class="stat-label">Total Images</div></div><div class="stat"><div class="stat-val" style="color:${d.missing_alt>0?'#ef4444':'#22c55e'}">${d.missing_alt||0}</div><div class="stat-label">Missing Alt</div></div><div class="stat"><div class="stat-val">${d.with_issues||0}</div><div class="stat-label">With Issues</div></div></div>${(d.images||[]).filter(i=>i.issue_count>0).slice(0,10).map(i=>`<div class="issue-item">${i.filename||"unnamed"}: ${i.issues}</div>`).join("")||'<div class="pass-item">All images look good ✅</div>'}`},

  {id:"mobile",icon:"📱",title:"Mobile Friendly Checker",desc:"Checks viewport, font sizes, tap targets, and responsive image attributes",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`${renderScore(d.score,d.grade)}<br><b>Viewport:</b> ${d.has_viewport?"✅":"❌"} &nbsp; <b>AMP:</b> ${d.has_amp?"✅":"—"}<br><br>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">Mobile-friendly ✅</div>'}`},

  {id:"page-speed",icon:"⚡",title:"Page Speed Analyzer",desc:"Measures response time, page size, render-blocking scripts, and lazy loading",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.response_time_s||0}s</div><div class="stat-label">Load Time</div></div><div class="stat"><div class="stat-val">${d.page_size_kb||0}KB</div><div class="stat-label">Page Size</div></div><div class="stat"><div class="stat-val">${d.score||0}</div><div class="stat-label">Score</div></div></div>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">No speed issues ✅</div>'}`},

  {id:"cwv",icon:"🏃",title:"Core Web Vitals Estimator",desc:"Estimates LCP, CLS, and FID/INP signals from HTML analysis",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`${renderScore(d.score,d.grade)}<br><div class="stat-row"><div class="stat"><div class="stat-val">${d.ttfb_s||0}s</div><div class="stat-label">TTFB</div></div><div class="stat"><div class="stat-val">${d.lcp_score||0}/33</div><div class="stat-label">LCP</div></div><div class="stat"><div class="stat-val">${d.cls_score||0}/33</div><div class="stat-label">CLS</div></div><div class="stat"><div class="stat-val">${d.fid_score||0}/34</div><div class="stat-label">FID</div></div></div>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">No CWV issues ✅</div>'}`},

  {id:"readability",icon:"📖",title:"Readability Analyzer",desc:"Flesch-Kincaid, Gunning Fog, Coleman-Liau readability scores with sentence analysis",cat:"content",badge:"content",
   fields:[{label:"URL (or leave blank to paste text)",key:"url",type:"text",ph:"https://example.com"},{label:"Or paste text",key:"text",type:"textarea",ph:"Paste your content here..."}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.total_words||0}</div><div class="stat-label">Words</div></div><div class="stat"><div class="stat-val">${d.flesch_kincaid_grade||0}</div><div class="stat-label">FK Grade</div></div><div class="stat"><div class="stat-val">${d.gunning_fog||0}</div><div class="stat-label">Fog Index</div></div></div><b>Grade Level:</b> ${d.grade_label||"—"}<br><b>Avg Sentence:</b> ${d.avg_sentence_length||0} words<br><b>Complex Words:</b> ${d.complex_words_pct||0}%<br><b>Long Sentences:</b> ${d.long_sentences||0}`},

  {id:"freshness",icon:"📅",title:"Content Freshness Scorer",desc:"Scores content freshness from date signals, meta tags, and outdated references",cat:"content",badge:"content",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`${renderScore(d.score,d.grade)}<br>${(d.factors||[]).map(f=>`<div style="padding:4px 0;font-size:13px"><span style="color:${f.pts>0?'#22c55e':'#ef4444'}">${f.pts>0?'+':''}${f.pts}</span> ${f.desc}</div>`).join("")}`},

  {id:"content-optimizer",icon:"🎯",title:"Content Optimizer",desc:"Full SEO scoring: keyword in title/H1/meta, density, readability, structure",cat:"content",badge:"content",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"},{label:"Target Keyword",key:"keyword",type:"text",ph:"best seo tools"}],
   render:(d)=>`${renderScore(d.score,d.grade)}<br><div class="stat-row"><div class="stat"><div class="stat-val">${d.word_count||0}</div><div class="stat-label">Words</div></div><div class="stat"><div class="stat-val">${d.keyword_frequency||0}</div><div class="stat-label">KW Count</div></div><div class="stat"><div class="stat-val">${d.keyword_density||0}%</div><div class="stat-label">KW Density</div></div></div>${(d.details||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #334155"><span>${i.check}</span><span style="color:${i.pts>=i.max?'#22c55e':i.pts>0?'#fb923c':'#94a3b8'}">${i.pts}/${i.max}</span></div>`).join("")}`},

  {id:"site-audit",icon:"🔍",title:"Site Audit Summary",desc:"Comprehensive one-pass SEO audit: meta, content, links, schema, speed, images",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"},{label:"Target Keyword (optional)",key:"keyword",type:"text",ph:"seo tools"}],
   render:(d)=>`${renderScore(d.score,d.grade)}<br><div class="stat-row"><div class="stat"><div class="stat-val" style="color:#22c55e">${d.passed_count||0}</div><div class="stat-label">Passed</div></div><div class="stat"><div class="stat-val" style="color:#ef4444">${d.issues_count||0}</div><div class="stat-label">Issues</div></div><div class="stat"><div class="stat-val">${d.word_count||0}</div><div class="stat-label">Words</div></div></div>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")}${(d.passed||[]).map(i=>`<div class="pass-item">${i}</div>`).join("")}`},

  {id:"schema",icon:"🗂️",title:"Schema Extractor",desc:"Extracts and validates JSON-LD structured data and Microdata from any page",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.json_ld_count||0}</div><div class="stat-label">JSON-LD</div></div><div class="stat"><div class="stat-val">${d.microdata_count||0}</div><div class="stat-label">Microdata</div></div></div>${(d.schemas||[]).map(s=>`<div style="padding:8px;background:#0f172a;border-radius:6px;margin:4px 0;font-size:13px"><b style="color:#38bdf8">${s.type||"Unknown"}</b><br>${JSON.stringify(s.data||{}).slice(0,200)}...</div>`).join("")||'<div class="issue-item">No structured data found</div>'}`},

  {id:"faq-schema",icon:"❓",title:"FAQ Schema Generator",desc:"Extracts Q&A pairs from pages and generates valid FAQ JSON-LD schema markup",cat:"content",badge:"content",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com/faq"}],
   render:(d)=>`<b>${d.pairs_count||0} Q&A pairs found</b><br><br>${(d.pairs||[]).slice(0,5).map(p=>`<div style="margin:8px 0;padding:8px;background:#0f172a;border-radius:6px;font-size:13px"><b style="color:#38bdf8">Q:</b> ${p.question}<br><b style="color:#64748b">A:</b> ${(p.answer||"").slice(0,120)}...</div>`).join("")}<br><b>JSON-LD Preview:</b><pre style="font-size:11px;color:#64748b">${(d.json_ld||"").slice(0,400)}...</pre>`},

  {id:"structured-data",icon:"📊",title:"Structured Data Generator",desc:"Generates Article, Product, LocalBusiness, HowTo JSON-LD schema from page or inputs",cat:"technical",badge:"technical",
   fields:[{label:"Type",key:"type",type:"select",options:["article","product","local-business","howto"]},{label:"URL (optional)",key:"url",type:"text",ph:"https://example.com"},{label:"Name (for product/business)",key:"name",type:"text",ph:"My Product"},{label:"Description",key:"description",type:"text",ph:"Optional description"},{label:"Price (for product)",key:"price",type:"text",ph:"29.99"},{label:"Author (for article)",key:"author",type:"text",ph:"John Doe"}],
   render:(d)=>`<b>Generated ${(d.schema||{})["@type"]||""} Schema:</b><pre style="font-size:12px;color:#64748b;margin-top:8px">${(d.json_ld||"").slice(0,800)}</pre>`},

  {id:"serp-preview",icon:"🔎",title:"SERP Snippet Previewer",desc:"Simulates how your page appears in Google search results with pixel analysis",cat:"content",badge:"content",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`<div style="background:#0f172a;border-radius:8px;padding:16px;margin-bottom:12px"><div style="color:#8ab4f8;font-size:16px;font-weight:500">${d.title_preview||"No title"}</div><div style="color:#34a853;font-size:12px;margin:2px 0">${d.breadcrumb||""}</div><div style="color:#bdc1c6;font-size:13px">${d.desc_preview||"No description"}</div></div><b>Title:</b> ${d.title_length||0} chars ${d.title_ok?'✅':'⚠️'}<br><b>Description:</b> ${d.desc_length||0} chars ${d.desc_ok?'✅':'⚠️'}<br><br>${(d.issues||[]).map(i=>`<div class="issue-item">💡 ${i}</div>`).join("")||'<div class="pass-item">Snippet looks good ✅</div>'}`},

  {id:"social-preview",icon:"📣",title:"Social Preview Validator",desc:"Validates Open Graph and Twitter Card tags for social media sharing",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"}],
   render:(d)=>`${renderScore(d.score)}<br><table style="width:100%;font-size:13px;margin-top:8px"><tr><td style="color:#64748b;padding:4px 0">OG Title</td><td>${d.og_title||'❌ Missing'}</td></tr><tr><td style="color:#64748b;padding:4px 0">OG Image</td><td>${d.og_image?'✅ Present':'❌ Missing'}</td></tr><tr><td style="color:#64748b;padding:4px 0">Twitter Card</td><td>${d.twitter_card||'❌ Missing'}</td></tr></table><br>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">All social tags present ✅</div>'}`},

  {id:"redirects",icon:"↩️",title:"Redirect Chain Checker",desc:"Traces redirect chains, detects loops, mixed HTTP/HTTPS, and temporary redirects",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com/old-page"}],
   render:(d)=>`<b>Hops:</b> ${d.hops||0} &nbsp; <b>Final Status:</b> ${d.final_status||"—"}<br><br><b>Chain:</b><br>${(d.chain||[]).map(c=>`<div style="font-size:12px;padding:3px 0;color:#94a3b8">[${c.status||"…"}] ${c.url}</div>`).join("")}<br>${(d.issues||[]).map(i=>`<div class="issue-item">${i}</div>`).join("")||'<div class="pass-item">No redirect issues ✅</div>'}`},

  {id:"robots",icon:"🤖",title:"Robots.txt Analyzer",desc:"Parses robots.txt, checks disallow rules, sitemap declarations, crawl delays",cat:"technical",badge:"technical",
   fields:[{label:"URL",key:"url",type:"text",ph:"https://example.com"},{label:"Test Path (optional)",key:"test_path",type:"text",ph:"/blog/"}],

   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val" style="color:#ef4444">${d.gaps_count||0}</div><div class="stat-label">Gaps</div></div><div class="stat"><div class="stat-val" style="color:#22c55e">${d.strengths_count||0}</div><div class="stat-label">Strengths</div></div></div><b>Top Gaps (terms you're missing):</b><br>${(d.top_gaps||[]).slice(0,15).map(g=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #1e293b"><span style="color:${g.priority==='HIGH'?'#ef4444':'#fb923c'}">${g.term}</span><span style="color:#38bdf8">${g.competitor_tfidf}</span></div>`).join("")}`,

  {id:"cannibalization",icon:"🦈",title:"Keyword Cannibalization Detector",desc:"Detects pages on the same site competing for the same keywords",cat:"keyword",badge:"keyword",
   fields:[{label:"URLs — one per line (min 2, same site)",key:"urls_text",type:"textarea",ph:"https://site.com/page1\nhttps://site.com/page2\nhttps://site.com/page3"},{label:"Similarity Threshold",key:"threshold",type:"text",ph:"0.5"}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.pages_analyzed||0}</div><div class="stat-label">Pages</div></div><div class="stat"><div class="stat-val" style="color:${d.conflicts_found>0?'#ef4444':'#22c55e'}">${d.conflicts_found||0}</div><div class="stat-label">Conflicts</div></div></div>${(d.conflicts||[]).map(c=>`<div style="padding:8px;background:#0f172a;border-radius:6px;margin:4px 0;font-size:12px;border-left:3px solid ${c.severity==='HIGH'?'#ef4444':'#fb923c'}"><div style="display:flex;justify-content:space-between"><b>${c.similarity}</b><span>${c.severity}</span></div><div style="color:#94a3b8">${c.page_a.slice(0,50)}</div><div style="color:#94a3b8">${c.page_b.slice(0,50)}</div><div style="color:#64748b">Shared: ${c.shared_terms}</div></div>`).join("")||'<div class="pass-item">No cannibalization detected ✅</div>'}`,
   transform:(data)=>({...data,urls:data.urls_text?data.urls_text.split("\n").filter(u=>u.trim()):[],threshold:parseFloat(data.threshold)||0.5})},

  {id:"topic-model",icon:"🧩",title:"Topic Modeler",desc:"Runs NMF topic modeling on multiple pages to discover content themes",cat:"keyword",badge:"keyword",
   fields:[{label:"URLs — one per line (min 2)",key:"urls_text",type:"textarea",ph:"https://site.com/page1\nhttps://site.com/page2\nhttps://site.com/page3"},{label:"Number of Topics",key:"num_topics",type:"text",ph:"5"}],
   render:(d)=>`<b>${d.num_topics||0} Topics Found:</b><br>${(d.topics||[]).map(t=>`<div style="padding:8px;background:#0f172a;border-radius:6px;margin:4px 0;font-size:12px"><b style="color:#38bdf8">Topic ${t.topic_id}: ${t.label}</b><br><span style="color:#64748b">${(t.top_terms||[]).slice(0,6).join(", ")}</span></div>`).join("")}<br><b>Document Assignments:</b><br>${(d.assignments||[]).map(a=>`<div style="font-size:12px;padding:3px 0;color:#94a3b8">${a.document.slice(0,40)} → <span style="color:#38bdf8">Topic ${a.dominant_topic}</span> (${a.confidence})</div>`).join("")}`,
   transform:(data)=>({...data,urls:data.urls_text?data.urls_text.split("\n").filter(u=>u.trim()):[],num_topics:parseInt(data.num_topics)||5})},

  {id:"search-console",icon:"📡",title:"Search Console Analyzer",desc:"Finds quick wins, striking distance keywords, and CTR opportunities from GSC data",cat:"keyword",badge:"keyword",
   fields:[{label:"GSC Data — paste as JSON [{\"query\":\"...\",\"clicks\":0,\"impressions\":0,\"position\":0}]",key:"rows_json",type:"textarea",ph:'[{"query":"seo tools","clicks":50,"impressions":500,"position":8,"ctr":0.1},{"query":"best seo software","clicks":10,"impressions":200,"position":15}]'}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.total_clicks||0}</div><div class="stat-label">Clicks</div></div><div class="stat"><div class="stat-val">${d.total_impressions||0}</div><div class="stat-label">Impressions</div></div><div class="stat"><div class="stat-val">${d.avg_position||0}</div><div class="stat-label">Avg Position</div></div></div><b>Quick Wins:</b><br>${(d.quick_wins||[]).slice(0,5).map(r=>`<div style="font-size:13px;padding:3px 0;border-bottom:1px solid #334155">Pos ${r.position?.toFixed(1)||"?"} | ${r.impressions} impr — <span style="color:#38bdf8">${r.query}</span></div>`).join("")}<br><b>Striking Distance (Page 2):</b><br>${(d.striking_distance||[]).slice(0,5).map(r=>`<div style="font-size:13px;padding:3px 0;border-bottom:1px solid #334155">Pos ${r.position?.toFixed(1)||"?"} | ${r.impressions} impr — <span style="color:#fb923c">${r.query}</span></div>`).join("")}`,
   transform:(data)=>{try{return {...data,rows:JSON.parse(data.rows_json||"[]")}}catch(e){return {...data,rows:[]}}}},

  {id:"log-analyzer",icon:"📜",title:"Log File Analyzer",desc:"Parses server access logs for bot crawl insights and crawl budget waste",cat:"technical",badge:"technical",
   fields:[{label:"Paste access log lines (Combined Log Format)",key:"log_content",type:"textarea",ph:'127.0.0.1 - - [08/Apr/2026:10:00:00 +0000] "GET /page HTTP/1.1" 200 1234 "-" "Googlebot/2.1"'}],
   render:(d)=>`<div class="stat-row"><div class="stat"><div class="stat-val">${d.total_requests||0}</div><div class="stat-label">Total Requests</div></div><div class="stat"><div class="stat-val">${d.crawl_waste?.total||0}</div><div class="stat-label">Crawl Waste</div></div></div><b>Bot Distribution:</b><br>${Object.entries(d.bot_distribution||{}).map(([bot,count])=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0">${bot}<span style="color:#38bdf8">${count}</span></div>`).join("")}<br><b>Top Crawled Pages:</b><br>${(d.bot_crawled_paths||[]).slice(0,8).map(p=>`<div style="font-size:12px;padding:2px 0;color:#94a3b8">${p.count}× ${p.path}</div>`).join("")}`}
];

function renderScore(score, grade){
  const color = score>=80?'#22c55e':score>=60?'#fb923c':'#ef4444';
  return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><div style="font-size:36px;font-weight:700;color:${color}">${score||0}</div><div><div style="font-size:13px;color:#64748b">Score / 100</div>${grade?`<div style="font-size:20px;font-weight:700;color:${color}">Grade ${grade}</div>`:""}</div></div><div class="score-bar"><div class="score-fill" style="width:${score||0}%;background:${color}"></div></div>`;
}

function renderDist(dist){
  if(!dist) return "";
  return `<b>Type Distribution:</b><br>${Object.entries(dist).map(([t,c])=>`<span class="tag tag-${t}">${t}: ${c}</span>`).join("")}`;
}

let currentCat = "all";
let currentSearch = "";

function renderGrid(){
  const grid = document.getElementById("toolGrid");
  const filtered = TOOLS.filter(t=>{
    const matchCat = currentCat==="all" || t.cat===currentCat;
    const matchSearch = !currentSearch || t.title.toLowerCase().includes(currentSearch) || t.desc.toLowerCase().includes(currentSearch);
    return matchCat && matchSearch;
  });
  grid.innerHTML = filtered.map(t=>`
    <div class="card" onclick="openTool('${t.id}')" data-cat="${t.cat}">
      <div class="card-icon">${t.icon}</div>
      <div class="card-title">${t.title}</div>
      <div class="card-desc">${t.desc}</div>
      <span class="card-badge badge-${t.badge}">${t.badge}</span>
    </div>
  `).join("");
}

function filterCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderGrid();
}

function filterTools(){
  currentSearch = document.getElementById("searchInput").value.toLowerCase();
  renderGrid();
}

function openTool(id){
  const tool = TOOLS.find(t=>t.id===id);
  if(!tool) return;
  document.getElementById("modalTitle").textContent = tool.icon+" "+tool.title;
  const body = document.getElementById("modalBody");
  body.innerHTML = `
    <p style="font-size:13px;color:#64748b;margin-bottom:16px">${tool.desc}</p>
    ${tool.fields.map(f=>`
      <div class="form-group">
        <label>${f.label}</label>
        ${f.type==="textarea"?`<textarea id="field_${f.key}" placeholder="${f.ph||""}"></textarea>`:
          f.type==="select"?`<select id="field_${f.key}">${(f.options||[]).map(o=>`<option value="${o}">${o}</option>`).join("")}</select>`:
          `<input type="text" id="field_${f.key}" placeholder="${f.ph||""}">`}
      </div>
    `).join("")}
    <button class="btn-run" onclick="runTool('${id}')">▶ Run Analysis</button>
    <div id="result_${id}"></div>
  `;
  document.getElementById("modal").classList.add("open");
}

function closeModal(){
  document.getElementById("modal").classList.remove("open");
}

document.getElementById("modal").addEventListener("click", function(e){
  if(e.target===this) closeModal();
});

async function runTool(id){
  const tool = TOOLS.find(t=>t.id===id);
  if(!tool) return;
  const btn = document.querySelector(".btn-run");
  const resultDiv = document.getElementById("result_"+id);
  btn.disabled = true; btn.textContent = "⏳ Analyzing...";
  resultDiv.innerHTML = `<div class="result-box"><div class="loading"><span class="spinner"></span>Analyzing... (first run may take 20s while Render wakes up)</div></div>`;

  let data = {};
  tool.fields.forEach(f=>{
    const el = document.getElementById("field_"+f.key);
    if(el) data[f.key] = el.value;
  });
  if(tool.transform) data = tool.transform(data);
  if(data.max_n) data.max_n = parseInt(data.max_n)||3;
  if(data.top) data.top = parseInt(data.top)||30;
  if(data.min_words) data.min_words = parseInt(data.min_words)||300;

  try{
    const resp = await fetch(`${API}/${id}`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)});
    const result = await resp.json();
    if(result.error){
      resultDiv.innerHTML = `<div class="result-box"><div class="issue-item">❌ Error: ${result.error}</div></div>`;
    } else {
      resultDiv.innerHTML = `<div class="result-box">${tool.render(result)}</div>`;
    }
  } catch(e){
    resultDiv.innerHTML = `<div class="result-box"><div class="issue-item">❌ Failed to connect to API. Make sure Render is running.</div></div>`;
  }
  btn.disabled = false; btn.textContent = "▶ Run Analysis";
}

renderGrid();
</script>
